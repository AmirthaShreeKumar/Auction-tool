spring.application.name=auction-backend

# Supabase PostgreSQL (Transaction Pooler - port 6543)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
# prepareThreshold=0 required for PgBouncer in transaction pooling mode
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.keepalive-time=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port
server.port=8080

# Dynamic Allowed Origins for CORS
app.allowed.origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174}

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# File upload limit (for Excel imports)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini AI Configuration (set your API key here or via environment variable)
gemini.api.key=${GEMINI_API_KEY}

# Cookie security: set to false for local http dev, true for production (enables SameSite=None; Secure)
app.cookie.secure=${COOKIE_SECURE:true}
